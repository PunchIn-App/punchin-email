name: Bug report
description: Something is broken or behaving incorrectly in the email worker
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: dropdown
    id: path
    attributes:
      label: Which path
      options:
        - Inbound (mail to an alias being forwarded to the inbox)
        - Relay (a reply going back out from the alias)
        - Routing (the wrong handler ran)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: alias
    attributes:
      label: Alias / address involved
      description: The base alias only — do NOT include anyone's personal email address.
      placeholder: "e.g. cve@, abuse+report@, relay+<id>@"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Worker version
      description: From package.json / the README version badge (e.g. 1.0.1)
      placeholder: "1.0.1"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >
        wrangler tail output, the rejection reason shown to the sender, or relevant
        message headers. Redact personal email addresses and message bodies before pasting.
    validations:
      required: false
