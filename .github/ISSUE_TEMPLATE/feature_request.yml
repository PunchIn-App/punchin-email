name: Feature request
description: Suggest a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: >
        What problem does this solve, or what limitation does it address?
        "I want X" is less useful than "When I do Y, I can't Z because…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Describe the behaviour, not the implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered, and why you prefer the proposed solution.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: >
        Optional — flag anything that affects scope, e.g. "changes a robustness guard",
        "requires a new var/binding", "affects header rewriting", "touches the relay sender check".
    validations:
      required: false
