# Auto-assign new issues/PRs to the "PunchIn" project board (org project #1)
# and populate the fields GitHub's built-in project workflows DON'T:
#   Labels · Priority · Size · Start/Target/Completion dates.
# On close it also clears any assignees (finished work shouldn't stay assigned).
# Status is intentionally left to the project's built-in workflows (Item added /
# Item closed / Pull request merged) so this never fights them or trips the
# built-in "Auto-close issue" rule.
#
# Everything runs under ADD_TO_PROJECT_PAT (the default GITHUB_TOKEN is kept
# read-only). That PAT must grant, on both repos:
#   Projects: read/write · Issues: read/write · Contents: read
name: Project automation

on:
  issues:
    types: [opened, reopened, closed]
  pull_request:
    types: [opened, reopened, closed, synchronize]

permissions: {}

jobs:
  automate:
    runs-on: ubuntu-latest
    # Skip fork PRs (no secrets) and Dependabot (no secrets passed to its events).
    if: ${{ (github.event_name == 'issues' || github.event.pull_request.head.repo.fork == false) && github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/github-script@v7
        env:
          PROJECT_OWNER: PunchIn-App
          PROJECT_NUMBER: "1"
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            const owner = process.env.PROJECT_OWNER, number = Number(process.env.PROJECT_NUMBER);
            const isPR = !!context.payload.pull_request;
            const c = context.payload.pull_request || context.payload.issue;
            const action = context.payload.action;

            // Conventional-commit type → label.
            const t = (c.title || '').toLowerCase();
            const m = t.match(/^([a-z]+)(\(|:|!)/); const p = m ? m[1] : '';
            let label = null;
            if (/\bdeps\b|\bbump\b/.test(t) && !t.includes('bump to v')) label = 'dependencies';
            else if (p === 'feat') label = 'enhancement';
            else if (p === 'fix') label = 'bug';
            else if (p === 'docs') label = 'documentation';
            else if (['build','chore','ci','refactor','test','perf','style','revert'].includes(p)) label = 'chore';

            if ((action === 'opened' || action === 'reopened') && label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: c.number, labels: [label],
              }).catch(e => core.warning(`label: ${e.message}`));
            }

            // Resolve the project + its field metadata.
            const meta = await github.graphql(`query($o:String!,$n:Int!){ organization(login:$o){ projectV2(number:$n){ id
              fields(first:50){ nodes{
                ... on ProjectV2FieldCommon{ id name }
                ... on ProjectV2SingleSelectField{ id name options{ id name } } } } } } }`, { o: owner, n: number });
            const proj = meta.organization.projectV2;
            const F = {}, OPT = {};
            for (const f of proj.fields.nodes) { if (!f || !f.name) continue; F[f.name] = f.id; if (f.options) { OPT[f.name] = {}; for (const o of f.options) OPT[f.name][o.name] = o.id; } }

            // Idempotent: returns the existing item if already on the board.
            const add = await github.graphql(`mutation($p:ID!,$c:ID!){ addProjectV2ItemById(input:{projectId:$p, contentId:$c}){ item{ id } } }`, { p: proj.id, c: c.node_id });
            const item = add.addProjectV2ItemById.item.id;

            const setDate = (n, d) => github.graphql(`mutation($p:ID!,$i:ID!,$f:ID!,$d:Date!){ updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{date:$d}}){ projectV2Item{ id } } }`, { p: proj.id, i: item, f: F[n], d });
            const setOpt = (n, o) => github.graphql(`mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){ updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{singleSelectOptionId:$o}}){ projectV2Item{ id } } }`, { p: proj.id, i: item, f: F[n], o: OPT[n][o] });
            const sizeOf = n => n < 10 ? 'XS' : n < 50 ? 'S' : n < 250 ? 'M' : n < 1000 ? 'L' : 'XL';
            const today = new Date().toISOString().slice(0, 10);

            if (action === 'opened' || action === 'reopened') {
              const labels = (c.labels || []).map(l => l.name || l).concat(label ? [label] : []);
              await setOpt('Priority', labels.some(l => l === 'bug' || l === 'enhancement') ? 'P1' : 'P2');
              await setDate('Start date', today);
              const tg = new Date(); tg.setDate(tg.getDate() + 3);
              await setDate('Target date', tg.toISOString().slice(0, 10));
              if (isPR) await setOpt('Size', sizeOf((c.additions || 0) + (c.deletions || 0)));
            } else if (action === 'synchronize' && isPR) {
              await setOpt('Size', sizeOf((c.additions || 0) + (c.deletions || 0)));
            } else if (action === 'closed') {
              await setDate('Completion Date', today);
              // Clear assignees on close — finished work shouldn't stay assigned.
              const assignees = (c.assignees || []).map(a => a.login);
              if (assignees.length) {
                await github.rest.issues.removeAssignees({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: c.number, assignees,
                }).catch(e => core.warning(`unassign: ${e.message}`));
              }
            }
