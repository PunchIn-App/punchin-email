# Posts an automated status update to the PunchIn project (#3):
#   - on each published release — a "shipped vX.Y.Z" update
# The weekly digest lives in punchin (not here) so it isn't posted twice.
# Status flag is auto-derived: AT_RISK if any open P0 items, else ON_TRACK.
#
# Runs under ADD_TO_PROJECT_PAT (Projects + Issues read/write, Contents read).
name: Project status update

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  post-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            const owner = 'PunchIn-App';
            const repos = ['punchin', 'punchin-email'];
            const since = new Date(Date.now() - 7 * 864e5).toISOString().slice(0, 10);
            const count = (q) => github.rest.search.issuesAndPullRequests({ q, per_page: 1 })
              .then(r => r.data.total_count).catch(() => 0);

            let merged = 0, opened = 0, closed = 0, openItems = 0;
            const mergedBy = {};
            for (const r of repos) {
              const base = `repo:${owner}/${r}`;
              const m = await count(`${base} is:pr is:merged merged:>=${since}`);
              mergedBy[r] = m; merged += m;
              opened += await count(`${base} is:issue created:>=${since}`);
              closed += await count(`${base} is:issue closed:>=${since}`);
              openItems += await count(`${base} is:open`);
            }

            // Open P0s drive the status flag.
            const proj = await github.graphql(`query($o:String!,$n:Int!){ user(login:$o){ projectV2(number:$n){ id
              items(first:100){ nodes{
                p:fieldValueByName(name:"Priority"){ ... on ProjectV2ItemFieldSingleSelectValue{ name } }
                content{ ... on Issue{ state } ... on PullRequest{ state } } } } } } }`, { o: owner, n: 3 });
            const pid = proj.user.projectV2.id;
            const openP0 = proj.user.projectV2.items.nodes
              .filter(i => i.p && i.p.name === 'P0' && i.content && i.content.state === 'OPEN').length;

            const isRelease = context.eventName === 'release';
            let version = '';
            if (isRelease) version = context.payload.release.tag_name;
            else { try { version = (await github.rest.repos.getLatestRelease({ owner, repo: context.repo.repo })).data.tag_name; } catch (e) {} }

            const headline = isRelease
              ? `🚀 Shipped ${context.repo.repo} ${context.payload.release.tag_name}`
              : `Week of ${new Date().toISOString().slice(0, 10)}`;
            const status = openP0 > 0 ? 'AT_RISK' : 'ON_TRACK';
            const body = [
              `**${headline}**${version ? ` — latest release **${version}**` : ''}`,
              ``,
              `- ✅ **${merged}** PRs merged (punchin ${mergedBy['punchin'] || 0} · punchin-email ${mergedBy['punchin-email'] || 0})`,
              `- 🐛 **${opened}** issues opened, **${closed}** closed`,
              `- 📋 **${openItems}** open items · **${openP0}** P0`,
              ``,
              `_Auto-generated from repo activity over the last 7 days._`,
            ].join('\n');

            const today = new Date().toISOString().slice(0, 10);
            const target = new Date(Date.now() + 7 * 864e5).toISOString().slice(0, 10);
            await github.graphql(`mutation($p:ID!,$b:String!,$s:ProjectV2StatusUpdateStatus!,$sd:Date,$td:Date){
              createProjectV2StatusUpdate(input:{projectId:$p, body:$b, status:$s, startDate:$sd, targetDate:$td}){ statusUpdate{ id status } } }`,
              { p: pid, b: body, s: status, sd: today, td: target });
            core.info(`Posted ${status} update (${headline})`);
