# TEMPORARY one-shot: adds High/Medium/Low options to org project #1's Priority
# field (currently empty) and probes the date-write path to capture its real error.
# Runs under ADD_TO_PROJECT_PAT. Delete after use.
name: _fix project priority
on:
  workflow_dispatch: {}
permissions: {}
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        env:
          PROJECT_OWNER: PunchIn-App
          PROJECT_NUMBER: "1"
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            const owner = process.env.PROJECT_OWNER, number = Number(process.env.PROJECT_NUMBER);
            const meta = await github.graphql(`query($o:String!,$n:Int!){ organization(login:$o){ projectV2(number:$n){ id
              fields(first:50){ nodes{ __typename ... on ProjectV2FieldCommon{ id name dataType } ... on ProjectV2SingleSelectField{ id name options{ id name } } } }
              items(first:1){ nodes{ id } } } } }`, { o: owner, n: number });
            const proj = meta.organization.projectV2;
            const byName = {}; for (const f of proj.fields.nodes) { if (f && f.name) byName[f.name] = f; }

            // (1) Add Priority options (field currently has none).
            const prio = byName['Priority'];
            try {
              const r = await github.graphql(`mutation($f:ID!,$o:[ProjectV2SingleSelectFieldOptionInput!]!){ updateProjectV2Field(input:{fieldId:$f, singleSelectOptions:$o}){ projectV2Field{ ... on ProjectV2SingleSelectField{ options{ name color } } } } }`,
                { f: prio.id, o: [
                  { name: 'High',   color: 'RED',    description: 'Urgent / high priority' },
                  { name: 'Medium', color: 'YELLOW', description: 'Normal priority' },
                  { name: 'Low',    color: 'GREEN',  description: 'Low priority' },
                ] });
              core.info('PRIORITY_RESULT:OK ' + JSON.stringify(r.updateProjectV2Field.projectV2Field.options));
            } catch (e) { core.info('PRIORITY_RESULT:ERR ' + JSON.stringify(e.errors || e.message)); }

            // (2) Probe the date write on the first item to capture the real error.
            const item = proj.items.nodes[0] && proj.items.nodes[0].id;
            const sd = byName['Start date'];
            try {
              const r = await github.graphql(`mutation($p:ID!,$i:ID!,$f:ID!,$d:Date!){ updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{date:$d}}){ projectV2Item{ id } } }`,
                { p: proj.id, i: item, f: sd.id, d: '2026-06-08' });
              core.info('DATE_RESULT:OK ' + JSON.stringify(r));
            } catch (e) { core.info('DATE_RESULT:ERR ' + JSON.stringify(e.errors || e.message)); }
