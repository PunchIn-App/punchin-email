# Auto-add new issues and PRs to the "PunchIn" project board (user project #3).
# GitHub's built-in auto-add workflow is per-repo and UI-only; this Action-based
# version is code-managed and lives in each repo the board tracks, so coverage
# stays consistent across punchin and punchin-email.
#
# Requires a repo secret ADD_TO_PROJECT_PAT: a PAT (classic, scope `project`, or
# a fine-grained token with read/write access to the user's Projects). The
# default GITHUB_TOKEN cannot write to a user-owned project, so a PAT is needed.
name: Add to project

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

# The Action authenticates with the PAT; the job's own GITHUB_TOKEN needs nothing.
permissions: {}

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    # Skip PRs from forks — secrets aren't exposed there, so auth would fail.
    if: ${{ github.event_name == 'issues' || github.event.pull_request.head.repo.fork == false }}
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/PunchIn-App/projects/3
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
